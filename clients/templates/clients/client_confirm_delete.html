{% extends "base.html" %}

{% block title %}Delete Client{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
                <h1 class="h5 mb-0">Delete Client</h1>
            </div>
            <div class="card-body">
                <p class="mb-4">Are you sure you want to delete <strong>{{ client.name }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'clients:client_detail' client.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
