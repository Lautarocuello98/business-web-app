{% extends "base.html" %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5 text-center">
                <h1 class="h4 mb-3">Session closed</h1>
                <p class="text-muted mb-4">You have logged out successfully.</p>
                <a href="{% url 'users:login' %}" class="btn btn-primary">Login again</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
